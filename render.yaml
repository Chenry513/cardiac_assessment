services:
  - type: web
    name: cardioscan
    env: python
    buildCommand: "pip install -r requirements.txt && python train_model.py"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cardioscan-db
          property: connectionString

databases:
  - name: cardioscan-db
    plan: free
